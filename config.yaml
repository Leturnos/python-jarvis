jarvis:
  threshold: 0.5
  cooldown_seconds: 2.5
  volume_multiplier: 1.0

voice_activation:
  mode: "hybrid" # always_listening, push_to_talk, hybrid, disabled
  push_to_talk:
    key: "ctrl+alt"
    behavior: "hold" # hold or toggle
  wake_word:
    enabled: true
    keyword: "hey_jarvis"
  auto_suspend:
    fullscreen: true

llm:
  active_provider: "gemini"
  providers:
    gemini:
      model: "gemini-2.5-flash"
    openai:
      model: "gpt-4.1-mini"
    anthropic:
      model: "claude-3-5-haiku-latest"

tts:
  provider: "sapi5"
  voice_keyword: "maria"

dry_run:
  enabled: true
  bypass_for_safe_intents: true
  timeout_seconds: 15

integrations:
  warp:
    path: "${WARP_PATH}"

quotas:
  llm:
    max_requests_per_day: 100
    max_tokens_per_day: 500000
