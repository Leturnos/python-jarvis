jarvis:
  threshold: 0.5
  cooldown_seconds: 2.5
  volume_multiplier: 1.0

voice_activation:
  mode: "hybrid" # always_listening, push_to_talk, hybrid, disabled
  push_to_talk:
    key: "ctrl+alt"
    behavior: "hold" # hold or toggle
  wake_word:
    enabled: true
    keyword: "hey_jarvis"
  auto_suspend:
    fullscreen: true
  thresholds:
    silence_rms: 15.0               # RMS below which is considered silence
    speech_rms: 20.0                # RMS above which check wake word
    max_zero_rms_frames: 30         # Consecutive zero RMS before resetting audio engine
  timeouts:
    silence_end_seconds: 1.5        # Silence duration to stop recording
    max_listening_seconds: 10.0     # Max listener duration for commands
  device_index: null                 # Index of the input microphone (null = system default)
  frames_per_buffer: 1280

stt:
  model_size: "tiny"                 # whisper model size: tiny, base, small, medium, large-v3
  language: "pt"                     # whisper transcription language
  device: "cpu"                      # cpu or cuda
  compute_type: "int8"               # int8, float16, float32

llm:
  active_provider: "openrouter"
  providers:
    gemini:
      model: "gemini-2.5-flash"
    openai:
      model: "gpt-4.1-mini"
    anthropic:
      model: "claude-3-5-haiku-latest"
    deepseek:
      model: "deepseek-chat"
    openrouter:
      model: "google/gemini-2.5-flash"

tts:
  provider: "sapi5"
  voice_keyword: "maria"
  rate: 2
  volume: 100
  cooldown_seconds: 2.0

timing:
  ui_stabilization_short: 0.1
  ui_stabilization_medium: 0.3
  ui_stabilization_long: 0.5
  warp_startup_delay: 2.0
  warp_tab_creation: 1.2
  warp_cmd_execution: 0.6
  window_search_sleep: 0.2
  window_recovery_sleep: 0.4
  post_focus_render_sleep: 0.5
  autoplay_click_delay: 1.8
  mouse_detect_polling: 0.1

dry_run:
  enabled: true
  bypass_for_safe_intents: true
  timeout_seconds: 15

timeouts:
  process_start: 5.0     # Maximum time (s) to wait for new process PIDs to appear
  window_appear: 10.0    # Maximum time (s) to wait for a visible window to be created
  focus: 3.0             # Maximum time (s) to wait for a window to gain focus during a try
  focus_retries: 3       # Number of activation/focus retries before aborting

integrations:
  warp:
    path: "${WARP_PATH}"

quotas:
  llm:
    max_requests_per_day: 100
    max_tokens_per_day: 500000

ai:
  nlp:
    fuzzy_match_threshold: 0.7      # Similarity score cutoff for command resolver (0.0 to 1.0)

automation:
  cv:
    template_confidence_high: 0.7   # Confidence threshold for high precision templates
    template_confidence_low: 0.4    # Tolerance threshold for low confidence fallback
  spotify:
    green_hsv_lower: [55, 100, 100]
    green_hsv_upper: [85, 255, 255]
    header_offset: 120
    search_vertical_offset_ratio: 0.1
    search_x_ratio: 0.25
    search_y_ratio: 0.35
    playlist_play_y_ratio: 0.4

runtime:
  memory_monitor:
    interval_seconds: 60
    threshold_mb: 800.0

